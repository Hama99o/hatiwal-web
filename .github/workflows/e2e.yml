name: Web E2E

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # Node 18 on purpose: Next is pinned to 15 and @playwright/test to 1.49.1,
      # both of which target Node 18.18 (Next 16 / Playwright 1.6x need Node >=20).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.18.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      # The Playwright config boots both the mock API and the Next server itself
      # (webServer), points the app at the mock via API_URL, and uses an isolated
      # .next-e2e dist dir — so this single step is fully self-contained.
      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
